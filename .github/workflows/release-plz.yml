name: Release-plz

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  release:
    name: Release-plz release
    # Only the canonical repository should publish crates or create releases.
    # Forks can still run CI, but release jobs would fail without trusted
    # credentials and would be surprising for contributors.
    if: ${{ github.repository_owner == 'joshka' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      pull-requests: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      releases: ${{ steps.release-plz.outputs.releases }}
      releases_created: ${{ steps.release-plz.outputs.releases_created }}

  prepare-release-assets:
    name: Prepare release assets
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.releases_created == 'true' }}
    outputs:
      jk_released: ${{ steps.release.outputs.jk_released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Read jk release
        id: release
        env:
          RELEASES: ${{ needs.release.outputs.releases }}
        run: |
          set -euo pipefail
          # release-plz emits one entry per released package in this workspace.
          # Binary assets only belong to the root `jk` package; the placeholder
          # library crates reserve names but do not produce release archives.
          jk_release='.[] | select(.package_name == "jk")'
          version="$(jq -r "${jk_release} | .version" <<<"$RELEASES" | head -n1)"
          tag="$(jq -r "${jk_release} | .tag" <<<"$RELEASES" | head -n1)"
          if [[ -z "$version" || -z "$tag" ]]; then
            echo "jk_released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "jk_released=true"
            echo "version=$version"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

  release-assets:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: prepare-release-assets
    if: ${{ needs.prepare-release-assets.outputs.jk_released == 'true' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Build from the exact release tag so the uploaded binaries match the
          # crates.io release metadata and cargo-binstall URL template.
          ref: ${{ needs.prepare-release-assets.outputs.tag }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install just
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: just

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build jk
        env:
          TARGET: ${{ matrix.target }}
        run: just build-release "$TARGET"

      - name: Package archive
        id: package
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.prepare-release-assets.outputs.version }}
        run: |
          set -euo pipefail
          # The archive filename is part of the cargo-binstall/Homebrew contract:
          # jk-<version>-<target>.tgz plus a sibling .sha256 file.
          archive="$(just package-release-archive "$TARGET" "$VERSION")"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksum=${archive}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release-assets.outputs.tag }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
        # --clobber makes manual release reruns idempotent after a failed matrix
        # leg or a packaging-script fix.
        run: gh release upload "$RELEASE_TAG" "$ARCHIVE" "$CHECKSUM" --clobber

  release-pr:
    name: Release-plz PR
    # The release PR should be maintained only from pushes to the canonical
    # repository. Manual workflow_dispatch is for publishing/rerunning releases.
    if: ${{ github.repository_owner == 'joshka' && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Run release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
